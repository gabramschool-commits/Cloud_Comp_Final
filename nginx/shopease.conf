# /etc/nginx/sites-available/shopease
# ShopEase E-Commerce nginx configuration
#
# Replace YOUR_VPS_IP with your actual VPS IP address or domain name

server {
    listen 80;
    server_name YOUR_VPS_IP;   # <-- REPLACE THIS

    # ── Frontend (React build files) ──────────────────────────────────
    root /var/www/ecommerce/frontend/dist;
    index index.html;

    # React Router support: always serve index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API (FastAPI via uvicorn) ──────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # FastAPI interactive docs (optional: remove in production)
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Static file caching ───────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── Gzip compression ──────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Logs ─────────────────────────────────────────────────────────
    access_log /var/log/nginx/shopease_access.log;
    error_log /var/log/nginx/shopease_error.log;
}
